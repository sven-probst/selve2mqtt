name: Build and Push Docker Image

# Trigger the workflow on pushes to the main branch
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push images to GitHub Container Registry

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }} # GITHUB_TOKEN is automatically provided by GitHub Actions

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }} # Image name will be ghcr.io/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
        tags: |
          type=raw,value=latest,enable={{is_default_branch}} # Tag as 'latest' on the default branch
          type=sha,format=long,prefix= # Tag with full commit SHA

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: . # Build from the current directory
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          VERSION=${{ steps.meta.outputs.version }}
        cache-from: type=gha # Use GitHub Actions cache for faster builds
        cache-to: type=gha,mode=max # Store build cache in GitHub Actions
        provenance: false # allow included healthcheck
